services:
  - type: web
    name: agriculture-hotspot-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agriculture-hotspot-db
          property: connectionString
      - key: PUBLIC_API_HOST
        value: 0.0.0.0
      - key: PUBLIC_API_AUTH_ENABLED
        value: "false"
      - key: PUBLIC_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: http://127.0.0.1:5173,http://localhost:5173
      - key: AI_PROVIDER
        value: mock
      - key: AI_API_KEY
        sync: false
      - key: AI_BASE_URL
        sync: false
      - key: AI_MODEL
        sync: false
      - key: HOTSPOT_FALLBACK_BASE_URL
        sync: false
      - key: BILIBILI_COOKIE
        sync: false
      - key: ZHIHU_COOKIE
        sync: false
      - key: WEIBO_COOKIE
        sync: false
      - key: DOUYIN_COOKIE
        sync: false
      - key: WECHAT_CHANNELS_COOKIE
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: YOUTUBE_REGION_CODE
        value: US
      - key: VIDEO_DOWNLOAD_ENABLED
        value: "true"
      - key: VIDEO_MAX_DOWNLOAD_BYTES
        value: "209715200"
      - key: VIDEO_YTDLP_ENABLED
        value: "true"
      - key: VIDEO_YTDLP_ALLOWED_DOMAINS
        value: youtube.com,youtu.be,bilibili.com,b23.tv,douyin.com,iesdouyin.com,weibo.com
      - key: OBJECT_STORAGE_ENABLED
        value: "false"
      - key: OBJECT_STORAGE_PROVIDER
        value: s3
      - key: OBJECT_STORAGE_BUCKET
        sync: false
      - key: OBJECT_STORAGE_ENDPOINT_URL
        sync: false
      - key: OBJECT_STORAGE_ACCESS_KEY_ID
        sync: false
      - key: OBJECT_STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: OBJECT_STORAGE_REGION
        value: auto
      - key: OBJECT_STORAGE_PUBLIC_BASE_URL
        sync: false
      - key: OBJECT_STORAGE_PREFIX
        value: videos
      - key: OBJECT_STORAGE_PRESIGN_SECONDS
        value: "3600"
      - key: OBJECT_STORAGE_DELETE_LOCAL_AFTER_UPLOAD
        value: "true"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: agriculture-videos
      - key: SUPABASE_STORAGE_PUBLIC
        value: "false"
      - key: MCP_BEARER_TOKEN
        generateValue: true

databases:
  - name: agriculture-hotspot-db
    databaseName: agriculture_hotspot
    user: agriculture_hotspot_user
    plan: free
    postgresMajorVersion: "15"
